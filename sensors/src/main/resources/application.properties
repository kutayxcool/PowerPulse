spring.application.name=powerpulse-sensors

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Kac ms'de bir telemetry uretilecek (CONTRACTS.md: v1 icin 5 saniye polling varsayimiyla uyumlu)
powerpulse.sensors.interval-ms=5000

# Apache Ignite thin client adresi (host:port)
ignite.address=${IGNITE_ADDRESS:localhost:10800}

# Core'un REST API adresi - Sensors, kayitli ev/cihaz listesini buradan ceker
# (CONTRACTS.md'deki AI_ADVISORY_BASE_URL isimlendirme desenine uyumlu)
powerpulse.core.base-url=${CORE_BASE_URL:http://localhost:8080/api}

# Core'daki ev/cihaz listesinin kac ms'de bir yenilenecegi
powerpulse.core.sync-interval-ms=15000

# Core artik /api/homes gibi uclarda JWT istiyor (kullanici oturumu) -
# Sensors bir kullaniciya ait olmadigi icin bunun yerine Core'un ayri,
# sistem geneli /api/internal/** ucunu paylasilan bir sifreyle (shared
# secret) kullanir. Bu deger Core'daki powerpulse.internal.api-key ile
# BIREBIR AYNI olmalidir.
powerpulse.core.internal-api-key=${INTERNAL_API_KEY:powerpulse-internal-dev-key-change-in-production}
