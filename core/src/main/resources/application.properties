spring.application.name=powerpulse-core
server.port=8080

# PostgreSQL
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5433/powerpulse_db}
spring.datasource.username=${POSTGRES_USER:powerpulse_user}
spring.datasource.password=${POSTGRES_PASSWORD:powerpulse_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=powerpulse-core
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.ack-mode=record

powerpulse.kafka.telemetry-topic=${TELEMETRY_TOPIC:telemetry}

# PowerPulse billing
powerpulse.billing.base-rate-per-kwh=${BASE_RATE_PER_KWH:2.10}

# CORS
powerpulse.cors.allowed-origin=${FRONTEND_URL:http://localhost:5173}

# Auth (JWT) - PROD'da JWT_SECRET mutlaka ortam degiskeni ile
# override edilmeli; buradaki varsayilan sadece yerel gelistirme icindir.
powerpulse.jwt.secret=${JWT_SECRET:powerpulse-local-dev-secret-key-change-in-production-0123456789}
powerpulse.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

# Internal servis-servis senkronizasyonu (Sensors -> Core, /api/internal/**).
# JWT gerektirmez, bunun yerine bu paylasilan sifreyi header'da bekler
# (X-Internal-Api-Key) - Sensors tarafinda AYNI deger ayarlanmali
# (bkz. sensors/application.properties: powerpulse.core.internal-api-key).
powerpulse.internal.api-key=${INTERNAL_API_KEY:powerpulse-internal-dev-key-change-in-production}

# Ignite
powerpulse.ignite.address=${IGNITE_ADDRESS:localhost:10800}
powerpulse.ai-advisory.base-url=${AI_ADVISORY_BASE_URL:http://localhost:8081}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method


powerpulse.telemetry.max-interval-seconds=${TELEMETRY_MAX_INTERVAL_SECONDS:10}

# Ignite -> PostgreSQL snapshot
powerpulse.snapshot.interval-ms=${SNAPSHOT_INTERVAL_MS:900000}
powerpulse.snapshot.initial-delay-ms=${SNAPSHOT_INITIAL_DELAY_MS:60000}

# Email notifications
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

powerpulse.mail.enabled=${MAIL_ENABLED:false}
powerpulse.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
powerpulse.mail.dispatch-interval-ms=${MAIL_DISPATCH_INTERVAL_MS:30000}
powerpulse.mail.initial-delay-ms=${MAIL_INITIAL_DELAY_MS:20000}

# Gemini AI
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-3-flash-preview}