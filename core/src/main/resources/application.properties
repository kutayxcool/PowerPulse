spring.application.name=powerpulse-core
server.port=8080

# PostgreSQL
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5433/powerpulse_db}
spring.datasource.username=${POSTGRES_USER:powerpulse_user}
spring.datasource.password=${POSTGRES_PASSWORD:powerpulse_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=powerpulse-core
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.ack-mode=record

powerpulse.kafka.telemetry-topic=${TELEMETRY_TOPIC:telemetry}

# PowerPulse billing
powerpulse.billing.base-rate-per-kwh=${BASE_RATE_PER_KWH:2.10}

# CORS
powerpulse.cors.allowed-origin=${FRONTEND_URL:http://localhost:5173}

# Ignite
powerpulse.ignite.address=${IGNITE_ADDRESS:localhost:10800}
powerpulse.ai-advisory.base-url=${AI_ADVISORY_BASE_URL:http://localhost:8081}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method


powerpulse.telemetry.max-interval-seconds=${TELEMETRY_MAX_INTERVAL_SECONDS:10}