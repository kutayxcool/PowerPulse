version: "3.8"

services:
  # --- Mesajlaşma (Telemetry & Registration akışları) ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: powerpulse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: powerpulse-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: powerpulse-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: powerpulse
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # --- Kalıcı veri (kullanıcı, ev, fatura geçmişi) ---
  postgres:
    image: postgres:16
    container_name: powerpulse-postgres
    environment:
      POSTGRES_DB: powerpulse_db
      POSTGRES_USER: powerpulse_user
      POSTGRES_PASSWORD: powerpulse_pass
    ports:
      - "5432:5432"
    volumes:
      - powerpulse_pg_data:/var/lib/postgresql/data

  # --- In-Memory Data Grid (anlık tüketim/anomali durumu) ---
  ignite:
    image: apacheignite/ignite:2.16.0
    container_name: powerpulse-ignite
    ports:
      - "10800:10800"
      - "47500:47500"
      - "47100:47100"
    environment:
      JVM_OPTS: "-Xms512m -Xmx1g"

volumes:
  powerpulse_pg_data:
